<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Instant Deployer</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .host-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; text-align: center; }
        input, textarea {
            width: 100%;
            background: #010409;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        textarea { height: 200px; font-family: monospace; }
        .btn-deploy {
            background: #238636;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-deploy:hover { background: #2ea043; }
        #urlDisplay {
            margin-top: 20px;
            padding: 15px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid #58a6ff;
            border-radius: 8px;
            display: none;
        }
        a { color: #58a6ff; word-break: break-all; }
    </style>
</head>
<body>

<div class="host-card">
    <h1>🐙 GitHub Deployer</h1>
    
    <label>Project Name (File Name):</label>
    <input type="text" id="fileName" placeholder="my-site">

    <label>HTML Code:</label>
    <textarea id="sourceCode" placeholder="<html><body>Hello!</body></html>"></textarea>

    <button class="btn-deploy" onclick="deployToGitHub()">GitHub එකට Deploy කරන්න</button>

    <div id="urlDisplay">
        <p>🚀 ඔබේ වෙබ් අඩවිය GitHub හි සජීවීව පවතී!</p>
        <p>URL: <a id="siteLink" href="#" target="_blank"></a></p>
        <small style="color: #8b949e;">සටහන: පළමු වරට Deploy වීමට විනාඩි 1-2ක් ගතවිය හැක.</small>
    </div>
</div>

<script>
    async function deployToGitHub() {
        const token = "YOUR_GITHUB_TOKEN"; // ඔබේ GitHub Token එක මෙතනට
        const username = "YOUR_USERNAME"; // GitHub Username එක
        const repo = "YOUR_REPO_NAME"; // කලින් හදාගත් Repository එකක නමක්
        
        const fileName = document.getElementById('fileName').value.trim().toLowerCase();
        const code = document.getElementById('sourceCode').value;

        if(!fileName || !code) return alert("කරුණාකර සියලු විස්තර පුරවන්න!");

        const path = `${fileName}.html`;
        const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;

        // Base64 encoding for GitHub API
        const content = btoa(unescape(encodeURIComponent(code)));

        try {
            const response = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Deploying ${fileName}`,
                    content: content
                })
            });

            if(response.ok) {
                const finalURL = `https://${username}.github.io/${repo}/${fileName}.html`;
                document.getElementById('siteLink').href = finalURL;
                document.getElementById('siteLink').innerText = finalURL;
                document.getElementById('urlDisplay').style.display = "block";
                alert("GitHub වෙත සාර්ථකව Upload විය!");
            } else {
                const err = await response.json();
                alert("වැරැද්දක් සිදු විය: " + err.message);
            }
        } catch (error) {
            console.error(error);
            alert("Error connecting to GitHub!");
        }
    }
</script>

</body>
</html>
