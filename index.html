<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashuu Login</title>
    <style>
        /* Dark Theme Styling */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #151515;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 {
            color: #00d4ff;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #00d4ff; }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0099cc;
            box-shadow: 0 0 10px #00d4ff;
        }

        #msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="https://raw.githubusercontent.com/HASHU-MD/hashu-database-music/refs/heads/main/VID-20260411-WA0000.mp4" type="audio/mpeg">
    </audio>

    <div class="login-card">
        <h2>LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">LOGIN</button>
        <p id="msg"></p>
    </div>

    <script>
        // Username, Password saha Redirect wenna oni Link eka methana thiyenne
        const users = [
            { username: "DILUKSHA", password: "HSSHSS2024", url: "https://www.mediafire.com/file/jflvsywz79y41zr/WHITE-MD-main_%25281%2529.zip/file" },
            { username: "HASHAN", password: "PASS123", url: "https://hashu-md.github.io/hashu-database-music/" },
            { username: "SANDARUWIDU", password: "ADMIN@2026", url: "https://hashu-md.github.io/hashu-database-music/" },
            { username: "", password: "WHITE2024", url: "https://www.youtube.com" },
            { username: "YUSHAN", password: "PASSWORD77", url: "https://www.facebook.com" },
            { username: "BINUKA", password: "MD_OFFICIAL", url: "https://web.whatsapp.com" },
            { username: "KAVISHA", password: "LUCKY99", url: "https://www.tiktok.com" },
            { username: "", password: "PASSWORD77", url: "https://www.facebook.com" },
            { username: "", password: "MD_OFFICIAL", url: "https://web.whatsapp.com" },
            { username: "", password: "LUCKY99", url: "https://www.tiktok.com" },
            { username: "YASIRU", password: "KASU1234", url: "https://www.instagram.com" },
            { username: "USHARA", password: "NIMAL007", url: "https://t.me/telegram" },
            { username: "", password: "KASU1234", url: "https://www.instagram.com" },
            { username: "", password: "NIMAL007", url: "https://t.me/telegram" },
            { username: "SHASHIKA", password: "THARU@98", url: "https://www.wikipedia.org" }
        ];

        function login() {
            const uInput = document.getElementById("user").value;
            const pInput = document.getElementById("pass").value;
            const m = document.getElementById("msg");
            const audio = document.getElementById("myAudio");

            // Input karapu user list eke thiyeda kiyala check kirima
            const validUser = users.find(u => u.username === uInput && u.password === pInput);

            if (validUser) {
                m.style.color = "#00ff88";
                m.innerHTML = "Success! Hi " + validUser.username + ", Redirecting in 9 sec...";
                
                // Music play kirima
                audio.play().catch(e => console.log("Audio play error:", e));

                // Ema user ta adala URL ekata redirect kirima
                setTimeout(() => {
                    window.location.href = validUser.url;
                }, 9000);

            } else {
                m.style.color = "#ff4d4d";
                m.innerHTML = "Invalid username or password! Try again.";
            }
        }
    </script>

</body>
</html>
